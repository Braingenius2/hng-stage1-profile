spring.application.name=profile
# Tell Spring to use H2 locally
spring.datasource.url=jdbc:h2:mem:profiledb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically create the database tables based on our Java code!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Enable the H2 web console so we can see our database in the browser
spring.h2.console.enabled=true

# Force JSON responses to use snake_case (e.g. age_group, created_at)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
